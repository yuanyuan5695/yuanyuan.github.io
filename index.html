<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子颛 | 个人主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0071e3',
                        secondary: '#f5f5f7',
                        dark: '#1d1d1f',
                        light: '#f5f5f7',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-sm {
                text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            }
            .bg-blur {
                backdrop-filter: blur(8px);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
        }
    </style>
</head>
<body class="bg-light text-dark font-sans">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 bg-blur z-50 border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="text-xl font-semibold text-primary">子颛</a>
            <div class="hidden md:flex space-x-8">
                <a href="#about" class="text-gray-700 hover:text-primary transition-all-300">关于我</a>
                <a href="#projects" class="text-gray-700 hover:text-primary transition-all-300">作品</a>
                <a href="#contact" class="text-gray-700 hover:text-primary transition-all-300">联系我</a>
            </div>
            <button class="md:hidden text-gray-700" id="menu-toggle">
                <i class="fa fa-bars text-xl"></i>
            </button>
        </div>
        <!-- 移动端菜单 -->
        <div class="md:hidden hidden bg-white border-t border-gray-200" id="mobile-menu">
            <div class="container mx-auto px-4 py-4 flex flex-col space-y-4">
                <a href="#about" class="text-gray-700 hover:text-primary transition-all-300 py-2">关于我</a>
                <a href="#projects" class="text-gray-700 hover:text-primary transition-all-300 py-2">作品</a>
                <a href="#contact" class="text-gray-700 hover:text-primary transition-all-300 py-2">联系我</a>
            </div>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <header class="pt-24 pb-16 md:pt-32 md:pb-24 bg-gradient-to-b from-white to-secondary">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">子颛</h1>
            <p class="text-xl md:text-2xl text-gray-600 mb-8">教育产品实践者</p>
            <p class="text-lg md:text-xl text-gray-500 max-w-2xl mx-auto">
                产品经理・行业场景探索者・用户价值挖掘者
            </p>
        </div>
    </header>

    <!-- 关于我 -->
    <section id="about" class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold mb-8 text-center">关于我</h2>
            <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm p-8 border border-gray-100">
                <div class="space-y-4">
                    <p class="text-gray-700 leading-relaxed">
                        教育用户增长与课程体系搭建经验
                    </p>
                    <p class="text-gray-700 leading-relaxed">
                        农业产销模式 / 宠物健康护理知识储备
                    </p>
                    <p class="text-gray-700 leading-relaxed">
                        教育产品落地：主导过教育产品从 0 到 1 全流程迭代
                    </p>
                    <p class="text-gray-700 leading-relaxed">
                        跨领域探索：用产品思维理解农业与宠物行业的用户痛点
                    </p>
                    <p class="text-gray-700 leading-relaxed">
                        独立实践：在细分场景中探索产品与行业结合的创新可能
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- 作品 -->
    <section id="projects" class="py-16 bg-secondary">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold mb-12 text-center">作品</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- 项目 1 -->
                <div class="bg-white rounded-xl overflow-hidden shadow-sm transition-all-300 hover:shadow-md">
                    <img src="https://picsum.photos/1920/1080?random=1" alt="生态农业调研" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="text-xl font-semibold mb-2">生态农业调研</h3>
                        <p class="text-gray-600 mb-4">生态农业</p>
                        <a href="https://my.feishu.cn/docx/GNnAdFAXXoynbax13UrcJpRkntd?from=from_copylink" target="_blank" class="flex items-center text-primary hover:underline">
                            <span class="mr-2">查看详情</span>
                            <i class="fa fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
                <!-- 项目 2 -->
                <div class="bg-white rounded-xl overflow-hidden shadow-sm transition-all-300 hover:shadow-md">
                    <img src="https://picsum.photos/1920/1080?random=2" alt="宠物经济调研" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="text-xl font-semibold mb-2">宠物经济调研</h3>
                        <p class="text-gray-600 mb-4">宠物&年轻人群</p>
                        <a href="https://my.feishu.cn/docx/VV4fdVz2voq8VcxvZbsc8hE4nwf?from=from_copylink" target="_blank" class="flex items-center text-primary hover:underline">
                            <span class="mr-2">查看详情</span>
                            <i class="fa fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系我 -->
    <section id="contact" class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold mb-8 text-center">联系我</h2>
            <div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-8 border border-gray-100">
                <div class="space-y-6">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary mr-4">
                            <i class="fa fa-wechat text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold">微信</h3>
                            <p class="text-gray-600">xiaoying1234</p>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-gray-100">
                        <p class="text-gray-500 text-sm text-center">
                            欢迎通过微信与我联系，一起交流产品设计与行业探索
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="py-8 bg-dark text-white">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400 text-sm">
                © 2026 子颛 | 个人主页
            </p>
        </div>
    </footer>

    <script>
        // 移动端菜单切换
        document.getElementById('menu-toggle').addEventListener('click', function() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        });

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                // 只对非空#链接执行平滑滚动
                if (href !== '#') {
                    e.preventDefault();
                    const target = document.querySelector(href);
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                        // 关闭移动端菜单
                        document.getElementById('mobile-menu').classList.add('hidden');
                    }
                }
            });
        });
    </script>
</body>
</html>
